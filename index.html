<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <link rel="stylesheet" href="style.css">
  
  <title>Social links profile</title>
</head>
<body>

  <div class="card">
    <div class="author">
      <img class="author-img" src="./assets/images/avatar-jessica.jpeg" alt="author">
      <h2 class="author-name">Jessica Randall</h2>
      <p class="auth-location">London, United Kingdom</p>
      <p class="auth-desc">"Front-end developer and avid reader."</p>
    </div>
    <div class="links">
      <button class="btn-primary">
        GitHub
      </button>
      <button class="btn-primary">
        Frontend Mentor
      </button>
      <button class="btn-primary">
        Linkedln
      </button>
      <button class="btn-primary">
        Twitter
      </button>
      <button class="btn-primary">
        Instagram
      </button>
    </div>
  </div>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Roopalakshmi V</a>.
  </footer>
</body>
</html>
